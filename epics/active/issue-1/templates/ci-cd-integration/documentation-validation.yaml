# CI/CD Pipeline for Documentation Validation
# Works with GitHub Actions, GitLab CI, or Jenkins

name: Documentation Validation & Generation

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'docs/**'
      - 'architecture/**'
      - '.github/workflows/docs.yaml'

jobs:
  validate-structure:
    name: Validate Documentation Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install -g \
            @mermaid-js/mermaid-cli \
            ajv-cli \
            markdown-link-check
            
      - name: Validate Mermaid diagrams
        run: |
          find . -name "*.mmd" -type f | while read file; do
            echo "Validating: $file"
            mmdc -i "$file" -o /tmp/test.svg || exit 1
          done
          
      - name: Validate JSON schemas
        run: |
          if [ -d "data/schemas" ]; then
            ajv compile -s "data/schemas/*.schema.json"
          fi
          
      - name: Check markdown links
        run: |
          find . -name "*.md" -type f | while read file; do
            markdown-link-check "$file" || true
          done

  validate-content:
    name: Validate Documentation Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup documentation tools
        run: |
          npm install -g \
            markdownlint-cli \
            write-good
            
      - name: Lint markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules
          
      - name: Check writing quality
        run: |
          find . -name "*.md" -type f | while read file; do
            write-good "$file" || true
          done
          
      - name: Validate ADRs
        if: ${{ hashFiles('architecture/decisions/*.md') != '' }}
        run: |
          npx adr-validator validate

  generate-docs:
    name: Generate Documentation
    needs: [validate-structure, validate-content]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install doc generation tools
        run: |
          npm install -g \
            mermaid-docs-generator \
            docs-as-data \
            modular-docs
            
      - name: Generate Mermaid documentation
        if: ${{ hashFiles('architecture/*.mmd') != '' }}
        run: |
          npx mermaid-docs generate
          
      - name: Generate modular documentation
        if: ${{ hashFiles('modules/**/*.md') != '' }}
        run: |
          npx modular-docs assemble --profile=all-audiences
          
      - name: Build docs-as-data outputs
        if: ${{ hashFiles('data/components/*.yaml') != '' }}
        run: |
          npx docs-as-data generate --all
          
      - name: Upload generated docs
        uses: actions/upload-artifact@v3
        with:
          name: generated-documentation
          path: |
            generated/
            outputs/
            
  test-documentation:
    name: Test Documentation Examples
    needs: generate-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download generated docs
        uses: actions/download-artifact@v3
        with:
          name: generated-documentation
          
      - name: Test code examples
        run: |
          # Extract and test code examples from documentation
          find . -name "*.md" -type f | while read file; do
            # Extract code blocks and test them
            awk '/```(bash|sh|javascript|python)/{flag=1;next}/```/{flag=0}flag' "$file" > /tmp/code_blocks.txt
            # Add your code testing logic here
          done
          
      - name: Validate API examples
        run: |
          # Test that API examples in docs match actual API
          echo "Testing API documentation examples..."

  deploy-docs:
    name: Deploy Documentation
    needs: [generate-docs, test-documentation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Download generated docs
        uses: actions/download-artifact@v3
        with:
          name: generated-documentation
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated/html
          
      - name: Update documentation index
        run: |
          # Update search index, navigation, etc.
          echo "Updating documentation index..."

  notify-changes:
    name: Notify Documentation Changes
    needs: deploy-docs
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Documentation build ${{ job.status }}
            Changes: ${{ github.event.head_commit.message }}
            View: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
