# Validation Rules
validationRules:
  requiredFields:
    - "processId"
    - "processName"
    - "description"
    - "category"
    - "status"
    - "owner"
  businessRules:
    - rule: "Process ID must be unique"
      validation: "Check against existing process IDs"
    - rule: "Process name must be descriptive"
      validation: "Minimum 5 words, maximum 100 characters"
    - rule: "Owner must be valid stakeholder"
      validation: "Owner must exist in stakeholder directory"
  qualityThresholds:
    minimumCompleteness: 80
    requiredDocumentation:
      - "Process description"
      - "Business rules"
      - "System dependencies"
      - "Performance metrics"