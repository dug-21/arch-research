# Process Definitions
processes:
  - processId: "PROC-001"
    processName: "Customer Onboarding"
    description: "Complete process for registering new customers including identity verification, risk assessment, and account setup"
    category: "CUST"
    subCategory: "New Customer Setup"
    version: "1.2"
    status: "active"
    lastUpdated: "2025-01-15T00:00:00Z"
    
    owner:
      name: "Jane Smith"
      title: "VP Customer Operations"
      department: "Customer Operations"
      email: "jane.smith@company.com"
      stakeholderId: "STK-001"
    
    operationalDetails:
      frequency: "daily"
      duration:
        average: 45
        minimum: 30
        maximum: 120
      volume:
        average: 75
        peak: 200
        unit: "applications"
        period: "day"
      slaRequirements:
        - metric: "Processing Time"
          target: "< 2 hours"
          measurement: "Time from application to account activation"
        - metric: "Success Rate"
          target: "> 95%"
          measurement: "Percentage of applications successfully processed"
      businessPriority: "high"
      seasonalVariation: true
      geographicScope: ["US", "Canada", "Mexico"]
    
    technicalDetails:
      automationLevel: "semi-automated"
      systemsInvolved:
        - systemId: "CRM-001"
          systemName: "Customer Relationship Management"
          role: "primary"
          criticality: "critical"
        - systemId: "FRAUD-001"
          systemName: "Fraud Detection System"
          role: "integration"
          criticality: "important"
      dataFlow:
        inputs:
          - name: "Customer Application"
            type: "form"
            frequency: "per application"
            format: "JSON"
            qualityRequirements: ["complete personal information", "valid identity documents"]
          - name: "Identity Documents"
            type: "file"
            frequency: "per application"
            format: "PDF/Image"
            qualityRequirements: ["clear images", "valid document types"]
        outputs:
          - name: "Customer Account"
            type: "database-update"
            destination: "CRM System"
            format: "Database record"
            frequency: "per application"
          - name: "Welcome Package"
            type: "notification"
            destination: "Customer email"
            format: "HTML email"
            frequency: "per approved application"
      integrationPoints:
        - type: "api"
          system: "Identity Verification Service"
          direction: "outbound"
          frequency: "real-time"
        - type: "api"
          system: "Credit Bureau"
          direction: "bidirectional"
          frequency: "real-time"
      securityRequirements:
        classification: "confidential"
        accessControls: ["Role-based access", "Multi-factor authentication"]
        complianceRequirements: ["KYC", "AML", "Data Privacy (GDPR/CCPA)"]
    
    businessContext:
      businessRules:
        - ruleId: "BR-001"
          description: "Customer must be 18 or older"
          condition: "age >= 18"
          action: "Proceed with application"
          exceptions: ["Legal guardian consent for 16-17 year olds"]
        - ruleId: "BR-002"
          description: "Identity verification must pass"
          condition: "identity_verification_status == 'PASSED'"
          action: "Continue to risk assessment"
          exceptions: ["Manual review for edge cases"]
      stakeholders:
        - stakeholderId: "STK-001"
          role: "owner"
          responsibility: "Process oversight and improvement"
          raci: "A"
          involvementFrequency: "daily"
        - stakeholderId: "STK-003"
          role: "reviewer"
          responsibility: "Financial risk assessment"
          raci: "C"
          involvementFrequency: "weekly"
      customerImpact: "critical"
      revenueImpact: "indirect"
    
    qualityMetrics:
      successRate:
        current: 95.2
        target: 98.0
        trend: "improving"
      keyPerformanceIndicators:
        - name: "Processing Time"
          measurement: "Average time from application to activation"
          currentValue: "42 minutes"
          targetValue: "30 minutes"
          frequency: "daily"
        - name: "Customer Satisfaction"
          measurement: "Post-onboarding survey score"
          currentValue: "4.2/5.0"
          targetValue: "4.5/5.0"
          frequency: "weekly"
      qualityGates:
        - gate: "Identity Verification"
          criteria: "Government ID verified and address confirmed"
          owner: "Compliance Officer"
        - gate: "Risk Assessment"
          criteria: "Risk score below threshold"
          owner: "Risk Manager"
    
    riskAssessment:
      riskLevel: "medium"
      riskFactors:
        - factor: "Identity Fraud"
          description: "Risk of fraudulent identity documents"
          probability: "medium"
          impact: "high"
          mitigation: "Multi-source identity verification"
        - factor: "System Outage"
          description: "CRM or verification system unavailability"
          probability: "low"
          impact: "high"
          mitigation: "Redundant systems and manual processes"
      singlePointsOfFailure: ["Primary identity verification service", "CRM system"]
    
    improvementOpportunities:
      - opportunityId: "IMP-001"
        title: "Automated Document Processing"
        description: "Implement OCR and AI for automatic document verification"
        type: "automation"
        priority: "high"
        estimatedEffort: "3-4 months"
        expectedBenefits: ["Reduced processing time", "Lower manual effort", "Improved accuracy"]
        status: "planned"
      - opportunityId: "IMP-002"
        title: "Real-time Risk Scoring"
        description: "Integrate ML-based risk assessment for instant decisions"
        type: "optimization"
        priority: "medium"
        estimatedEffort: "2-3 months"
        expectedBenefits: ["Faster processing", "Better risk detection"]
        status: "identified"
    
    relationships:
      upstreamProcesses: []
      downstreamProcesses:
        - processId: "PROC-002"
          relationship: "triggers"
          criticality: "critical"
        - processId: "PROC-005"
          relationship: "provides-input"
          criticality: "important"
      subProcesses: ["PROC-001-A", "PROC-001-B", "PROC-001-C"]
      parentProcess: null

